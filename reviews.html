<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Reviews — Khalid "The Sword" Shakur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{--gold:#C9A84C;--gold-light:#e8c96d;--bg:#080808;--bg2:#0f0f0f;--text:#F5F0E8;--muted:#7a7268;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.4;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;}
    nav::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,8,8,0.95),transparent);pointer-events:none;}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.25em;color:var(--gold);text-decoration:none;position:relative;}
    .nav-back{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid rgba(201,168,76,0.2);padding:0.6rem 1.2rem;transition:color 0.2s,border-color 0.2s;position:relative;}
    .nav-back:hover{color:var(--gold);border-color:var(--gold);}

    .page-hero{padding:12rem 3rem 5rem;background:var(--bg);border-bottom:1px solid rgba(201,168,76,0.1);position:relative;overflow:hidden;}
    .page-hero::before{content:'';position:absolute;top:-20%;right:-5%;width:60vw;height:140%;background:radial-gradient(ellipse at 60% 40%,rgba(185,28,28,0.1),transparent 65%);pointer-events:none;}
    .hero-label{font-size:0.65rem;letter-spacing:0.45em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:1rem;}
    .hero-label::before{content:'';width:30px;height:1px;background:var(--gold);}
    h1.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,10vw,9rem);line-height:0.88;color:var(--text);}
    h1.page-title span{color:var(--gold);}
    .hero-stats{display:flex;gap:4rem;margin-top:2.5rem;flex-wrap:wrap;}
    .hero-stat-val{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold);line-height:1;}
    .hero-stat-label{font-size:0.6rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}

    .reviews-page{padding:5rem 3rem;max-width:1300px;margin:0 auto;}
    .filter-bar{display:flex;gap:0.6rem;margin-bottom:3rem;flex-wrap:wrap;}
    .filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;padding:0.6rem 1.2rem;border:1px solid rgba(255,255,255,0.08);background:none;color:var(--muted);cursor:pointer;transition:color 0.2s,border-color 0.2s;}
    .filter-btn.active,.filter-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.4);}

    .reviews-masonry{columns:3;gap:1.5rem;}
    @media(max-width:1000px){.reviews-masonry{columns:2;}}
    @media(max-width:600px){.reviews-masonry{columns:1;}}
    .review-card{break-inside:avoid;background:rgba(255,255,255,0.02);border:1px solid rgba(201,168,76,0.12);padding:2rem;margin-bottom:1.5rem;transition:border-color 0.3s,background 0.3s;position:relative;}
    .review-card:hover{border-color:rgba(201,168,76,0.35);background:rgba(201,168,76,0.03);}
    .review-stars{color:var(--gold);font-size:0.9rem;letter-spacing:0.15em;margin-bottom:1rem;}
    .review-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.7;color:rgba(245,240,232,0.8);font-style:italic;margin-bottom:1.5rem;}
    .review-text::before{content:'\201C';font-size:3rem;color:rgba(201,168,76,0.2);line-height:0;vertical-align:-0.6rem;margin-right:0.3rem;font-family:'Cormorant Garamond',serif;}
    .review-author{display:flex;align-items:center;gap:0.8rem;border-top:1px solid rgba(255,255,255,0.05);padding-top:1rem;}
    .review-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,0.3),rgba(201,168,76,0.1));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);flex-shrink:0;}
    .review-author-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.06em;}
    .review-author-role{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
    .review-tag{position:absolute;top:1rem;right:1rem;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;border:1px solid rgba(201,168,76,0.25);color:var(--gold);padding:0.2rem 0.5rem;}
    .reviews-empty{text-align:center;padding:6rem 2rem;color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;}

    footer{background:var(--bg2);border-top:1px solid rgba(201,168,76,0.15);padding:2.5rem 3rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
    .footer-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.2em;color:var(--gold);}
    .footer-copy{font-size:0.65rem;letter-spacing:0.12em;color:var(--muted);}
    .footer-link{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
    .footer-link:hover{color:var(--gold);}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Khalid Shakur</a>
  <a href="index.html#reviews" class="nav-back">← Back to Site</a>
</nav>

<div class="page-hero">
  <div class="hero-label">Training Reviews</div>
  <h1 class="page-title">What Clients<br><span>Say</span></h1>
  <div class="hero-stats">
    <div><div class="hero-stat-val" id="stat-total">0</div><div class="hero-stat-label">Total Reviews</div></div>
    <div><div class="hero-stat-val" id="stat-stars">5.0</div><div class="hero-stat-label">Avg. Rating</div></div>
    <div><div class="hero-stat-val" id="stat-5star">0</div><div class="hero-stat-label">5-Star Reviews</div></div>
  </div>
</div>

<div class="reviews-page">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterReviews('all',this)">All Reviews</button>
    <button class="filter-btn" onclick="filterReviews('Training Client',this)">Training Clients</button>
    <button class="filter-btn" onclick="filterReviews('10-Session',this)">10-Session Package</button>
    <button class="filter-btn" onclick="filterReviews('20-Session',this)">20-Session Package</button>
    <button class="filter-btn" onclick="filterReviews('Single Session',this)">Single Session</button>
  </div>
  <div class="reviews-masonry" id="reviews-masonry"></div>
</div>

<footer>
  <div class="footer-name">Khalid "The Lion" Shakur</div>
  <a href="index.html" class="footer-link">← Back to Main Site</a>
  <div class="footer-copy">© 2025 Khalid Shakur Boxing · Singapore</div>
</footer>

<script>
let allReviews = [];

function loadReviews() {
  try { allReviews = JSON.parse(localStorage.getItem('ks_reviews') || '[]').filter(r => r.approved); }
  catch(e) { allReviews = []; }
}

function updateStats() {
  const n = allReviews.length;
  document.getElementById('stat-total').textContent = n;
  document.getElementById('stat-5star').textContent = allReviews.filter(r=>(r.stars||5)===5).length;
  const avg = n ? (allReviews.reduce((s,r)=>s+(r.stars||5),0)/n).toFixed(1) : '—';
  document.getElementById('stat-stars').textContent = avg;
}

function renderMasonry(reviews) {
  const el = document.getElementById('reviews-masonry');
  if (!reviews.length) {
    el.innerHTML = '<div class="reviews-empty">No reviews yet — check back soon.</div>';
    return;
  }
  el.innerHTML = reviews.map(r => `
    <div class="review-card">
      ${r.tag ? `<div class="review-tag">${r.tag}</div>` : ''}
      <div class="review-stars">${'★'.repeat(r.stars||5)}${'☆'.repeat(5-(r.stars||5))}</div>
      <div class="review-text">${r.text}</div>
      <div class="review-author">
        <div class="review-avatar">${(r.name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="review-author-name">${r.name}</div>
          <div class="review-author-role">${r.role||'Training Client'}${r.company ? ' · ' + r.company : ''}</div>
        </div>
      </div>
    </div>`).join('');
}

function filterReviews(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = tag === 'all' ? allReviews : allReviews.filter(r => (r.tag||r.role||'').includes(tag));
  renderMasonry(filtered);
}

loadReviews();
// Seed Olli's review if no reviews exist
if (!allReviews.length) {
  const seed = [{
    id: 'seed-001',
    name: 'Olli',
    role: 'Director — Finance',
    stars: 5,
    text: "I've been training with Shakur for the past four years and in short he is an excellent coach. He's incredibly knowledgeable about boxing, extremely disciplined, and one of the hardest working people I know. Every session is structured, focused, and pushes me to improve. What really sets him apart is his passion for the sport — he genuinely cares about your progress and development. On top of that, he's just a great guy to be around, which makes training with him something I genuinely look forward to. I highly recommend him to anyone serious about improving their boxing.",
    tag: 'Monthly Coaching',
    approved: true,
    date: new Date().toISOString()
  }];
  localStorage.setItem('ks_reviews', JSON.stringify(seed));
  allReviews = seed;
}
updateStats();
renderMasonry(allReviews);
</script>
</body>
</html>
